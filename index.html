<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lolen Coffee 2</title>
    <meta name="description" content="Lolen Coffee 2 — Point of Sale & Daily Dashboard" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>☕ Lolen Coffee 2</h2>
            <input type="password" id="passInput" placeholder="Enter PIN" maxlength="10">
            <button class="primary-btn" style="margin-top:4px;" onclick="checkLogin()">Login</button>
            <p id="loginError" style="color:#e53935; font-size:13px; margin-top:10px; display:none;">Wrong PIN, try
                again.</p>
        </div>
    </div>

    <div id="mainApp">
        <div class="card" style="padding:14px 16px; text-align:center; background:transparent; box-shadow:none;">
            <h1>☕ Lolen Coffee 2</h1>
            <img src="image.png" alt="Lolen Coffee Logo" style="max-width:340px; width:90%; margin-top:10px; border-radius:14px;">
        </div>

        <!-- POS -->
        <div class="pos-container">
            <div class="menu-grid">
                <div class="category-block">
                    <div class="cat-title" style="color:var(--primary)">☕ Coffee</div>
                    <div class="btn-grid">
                        <button class="item-btn btn-coffee" onclick="selectItem('Ice Americano',3000,this)">🧊 Ice
                            Americano<span>3,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Coffee Milk',3000,this)">☕ Coffee
                            Milk<span>3,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Coffee Milk Big',4000,this)">☕ Coffee
                            Milk Big<span>4,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Honey Lemon Tea',3000,this)">🍯 Honey
                            Lemon Tea<span>3,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Matcha Latte',5000,this)">🍵 Matcha
                            Latte<span>5,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Matcha Strawberry',5000,this)">🍓 Matcha
                            Strawberry<span>5,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Green Milk Tea',4000,this)">🍃 Green Milk
                            Tea<span>4,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Passion Milk',4000,this)">🥭 Passion
                            Milk<span>4,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Passion Soda',4000,this)">🫧 Passion
                            Soda<span>4,000 ៛</span></button>
                        <button class="item-btn btn-coffee" onclick="selectItem('Red Milk Tea',4000,this)">🫖 Red Milk
                            Tea<span>4,000 ៛</span></button>
                    </div>
                </div>
                <div class="category-block">
                    <div class="cat-title" style="color:var(--soda)">🥤 Drinks</div>
                    <div class="btn-grid">
                        <button class="item-btn btn-soda" onclick="selectItem('Sting',2500,this)">⚡ Sting<span>2,500
                                ៛</span></button>
                        <button class="item-btn btn-soda" onclick="selectItem('Iced Sting',3500,this)">🧊 Iced
                            Sting<span>3,500 ៛</span></button>
                        <button class="item-btn btn-soda" onclick="selectItem('Coca Cola',2500,this)">🥤 Coca
                            Cola<span>2,500 ៛</span></button>
                        <button class="item-btn btn-soda" onclick="selectItem('Iced Coca Cola',3500,this)">🧊 Iced Coca
                            Cola<span>3,500 ៛</span></button>
                        <button class="item-btn btn-soda" onclick="selectItem('Water',1000,this)">💧 Water<span>1,000
                                ៛</span></button>
                    </div>
                </div>

            </div>

            <!-- CHECKOUT -->
            <div class="checkout-panel card">
                <div class="selected-label">Selected Item</div>
                <div id="selectedName">—</div>
                <div class="qty-row">
                    <label>Qty:</label>
                    <input type="number" id="qtyInput" value="1" min="1" oninput="checkForm()">
                </div>
                <div class="pay-container">
                    <button type="button" class="pay-btn" id="btnCash" onclick="setPayment('Cash')">💵 Cash</button>
                    <button type="button" class="pay-btn" id="btnABA" onclick="setPayment('ABA')">🏦 ABA</button>
                </div>
                <div class="price-box" id="priceDisplay">0 ៛</div>
                <form id="salesForm">
                    <input type="hidden" id="finalItem" name="item" required>
                    <input type="hidden" id="finalPrice" name="price" required>
                    <button type="submit" id="submitBtn" class="primary-btn" disabled>Record Sale</button>
                </form>
                <div id="status"></div>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div class="card" id="printSection">
            <h2>📊 Daily Summary <span id="printDate"
                    style="display:none; font-weight:400; font-size:13px; color:#888;"></span></h2>

            <div class="stats-grid" style="grid-template-columns: repeat(2,1fr);">
                <div class="stat-card"><small>Drinks Sold</small>
                    <div class="val" id="qtyDrinks">0</div>
                </div>
                <div class="stat-card"><small>Total Items</small>
                    <div class="val" id="qtyTotal">0</div>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card" style="border-top:4px solid #2e7d32;"><small>💵 Cash</small>
                    <div class="val" id="revCash" style="color:#2e7d32;">0 ៛</div>
                </div>
                <div class="stat-card" style="border-top:4px solid var(--aba);"><small>🏦 ABA</small>
                    <div class="val" id="revABA" style="color:var(--aba);">0 ៛</div>
                </div>
                <div class="stat-card" style="border-top:4px solid var(--primary);"><small>💰 Gross</small>
                    <div class="val" id="revTotal">0 ៛</div>
                </div>
            </div>

            <!-- EXPENSE -->
            <div class="expense-section">
                <div class="expense-section-title">💸 Daily Expenses</div>
                <div class="expense-body">
                    <div>
                        <div class="expense-input-group">
                            <input type="text" id="expenseNote" placeholder="Note  (e.g. Ice, Milk, Salary)">
                            <input type="number" id="expenseAmt" placeholder="Amount in ៛" min="0">
                            <button class="add-expense-btn" onclick="addExpense()">+ Add Expense</button>
                        </div>
                        <div class="expense-list-wrap" id="expenseList">
                            <div class="expense-empty" id="expenseEmptyMsg">No expenses added yet.</div>
                        </div>
                        <div class="expense-total-row">
                            <span class="expense-total-label">Total expenses</span>
                            <div style="text-align:right; line-height:1.3;">
                                <span class="expense-total-val" id="expenseDisplay">0 ៛</span>
                                <div id="expenseDisplayUsd" style="font-size:13px; color:#888; font-weight:600;">$0.00
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="net-profit-box">
                        <span class="label">📈 Net Profit Today</span>
                        <div id="netProfit">0 ៛</div>
                        <div id="netProfitUsd"
                            style="font-size: 28px; font-weight: 700; color: #2e7d32; line-height: 1; margin-top: -4px;">
                            $0.00</div>
                    </div>
                </div>
            </div>

            <button type="button" class="primary-btn" style="background:#555; margin-bottom:18px;"
                onclick="printReport()">🖨️ Print Daily Report</button>

            <!-- PRINT ITEM BREAKDOWN (screen: hidden, print: visible) -->
            <div id="printItemList" style="display:none;"></div>

            <div style="width: 100%; overflow-x: auto; margin-bottom: 20px; border-radius: 8px;">
                <div id="chartWrapperInner" style="min-width: 600px; height: 300px; position: relative;">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>

            <span class="logout-link" onclick="logout()">Logout &amp; Lock</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
